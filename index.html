            &lt;button onclick=&quot;closeDataPrepModal()&quot; class=&quot;modal-btn absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-full p-1.5 transition-colors z-10&quot;&gt;

            &lt;/div&gt;

                &lt;svg class=&quot;w-4 h-4 text-slate-400&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2&quot;&gt;&lt;/path&gt;&lt;/svg&gt;

            &lt;button id=&quot;modal-action-btn&quot; onclick=&quot;handleModalAction()&quot; class=&quot;modal-btn w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-colors shadow-sm transform hover:-translate-y-0.5&quot;&gt;Start Training&lt;/button&gt;

    &lt;!-- 4. Model Training Process Modal --&gt;
    &lt;div id=&quot;model-training-modal&quot; class=&quot;fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden&quot;&gt;
        &lt;div class=&quot;bg-white rounded-2xl shadow-2xl p-6 w-full max-w-lg flex flex-col relative transition-all&quot;&gt;
            &lt;div class=&quot;flex items-center gap-3 mb-6 border-b border-slate-100 pb-3&quot;&gt;
                &lt;div id=&quot;training-spinner-container&quot; class=&quot;bg-indigo-100 text-indigo-600 p-2 rounded-full&quot;&gt;
                    &lt;svg id=&quot;training-spinner&quot; class=&quot;animate-spin w-5 h-5&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15&quot;&gt;&lt;/path&gt;&lt;/svg&gt;

            &lt;div id=&quot;training-content&quot; class=&quot;mb-2&quot;&gt;
                &lt;p class=&quot;text-xs text-slate-500 mb-4&quot;&gt;The model is learning the relationship between the variables. Please wait...&lt;/p&gt;
                
                &lt;div class=&quot;flex justify-between items-end mb-1&quot;&gt;
                    &lt;div class=&quot;bg-indigo-600 text-white text-xs font-bold px-2 py-1 rounded shadow-sm&quot; id=&quot;train-progress-text&quot;&gt;0%&lt;/div&gt;
                    &lt;div class=&quot;bg-emerald-50 text-emerald-700 text-xs font-bold px-2 py-1 rounded border border-emerald-100&quot;&gt;
                        Loss: &lt;span id=&quot;train-loss&quot; class=&quot;font-mono&quot;&gt;--&lt;/span&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
                
                &lt;div class=&quot;w-full bg-slate-100 rounded-full h-2.5 mb-6 overflow-hidden shadow-inner border border-slate-200&quot;&gt;
                    &lt;div id=&quot;train-progress-bar&quot; class=&quot;bg-gradient-to-r from-indigo-500 to-emerald-400 h-2.5 rounded-full transition-all duration-75&quot; style=&quot;width: 0%&quot;&gt;&lt;/div&gt;
                &lt;/div&gt;

                &lt;div class=&quot;flex justify-between text-xs text-slate-500 bg-slate-50 p-3 rounded-lg border border-slate-100 shadow-inner&quot;&gt;
                    &lt;div class=&quot;flex items-center gap-1.5&quot;&gt;
                        &lt;svg class=&quot;w-4 h-4 text-slate-400&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                        Elapsed: &lt;span id=&quot;train-elapsed&quot; class=&quot;font-mono font-bold text-slate-700&quot;&gt;0.0s&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;flex items-center gap-1.5&quot;&gt;
                        &lt;svg class=&quot;w-4 h-4 text-slate-400&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                        Remaining: &lt;span id=&quot;train-remain&quot; class=&quot;font-mono font-bold text-slate-700&quot;&gt;--s&lt;/span&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;script&gt;
        const customCanvasBackgroundColor = {
            id: &#39;customCanvasBackgroundColor&#39;,
            beforeDraw: (chart, args, options) =&gt; {
                const {ctx} = chart;
                ctx.save();
                ctx.globalCompositeOperation = &#39;destination-over&#39;;
                ctx.fillStyle = options.color || &#39;#ffffff&#39;;
                ctx.fillRect(0, 0, chart.width, chart.height);
                ctx.restore();
            }
        };

        const expData = {
            concentration: { inputType: &#39;number&#39;, name: &quot;Concentration of Acid&quot;, unit: &quot;M&quot;, xPlaceholder: &quot;e.g., 1.0&quot;, defaultVal: 1.0, calcY: (x) =&gt; Math.min(110, Math.max(0, 45 * x + 5)) },
            ph: { inputType: &#39;number&#39;, name: &quot;pH Value of Acid&quot;, unit: &quot;pH&quot;, xPlaceholder: &quot;e.g., 1&quot;, defaultVal: 1.0, calcY: (x) =&gt; Math.min(110, Math.max(0, 125 - 35 * x)) },
            acidType: { inputType: &#39;acid&#39;, name: &quot;Type of Acid&quot;, unit: &quot;H+&quot;, xPlaceholder: &quot;Type Acid...&quot;, defaultVal: &quot;Hydrochloric Acid&quot;, calcY: (x) =&gt; Math.min(110, Math.max(0, 30 * x)) },
            temperature: { inputType: &#39;number&#39;, name: &quot;Temperature&quot;, unit: &quot;°C&quot;, xPlaceholder: &quot;e.g., 30&quot;, defaultVal: 25.0, calcY: (x) =&gt; Math.min(110, Math.max(0, 1.6 * x + 5)) },
            surfaceArea: { inputType: &#39;surfaceSelect&#39;, name: &quot;Surface Area of Metal&quot;, unit: &quot;Portions&quot;, xPlaceholder: &quot;Choose Portion&quot;, defaultVal: 1, calcY: (x) =&gt; Math.min(110, Math.max(0, 3 * x + 20)) },
            metalType: { inputType: &#39;metal&#39;, name: &quot;Type of Metal&quot;, unit: &quot;Idx&quot;, xPlaceholder: &quot;Type Metal...&quot;, defaultVal: &quot;Zinc&quot;, calcY: (x) =&gt; Math.min(110, Math.max(0, 1.0 * x + 5)) }
        };

        let currentMode = &#39;training&#39;; 
        let currentVar = null;
        let chartInstance = null;
        let trainedModel = { m: 0, c: 0 }; 
        let html5QrcodeScanner = null;
        let pendingTrainingPoints = []; 

        // --- MODE SWITCHING &amp; SELECTION ---
        function setMode(mode) {
            currentMode = mode;
            const btnTrain = document.getElementById(&#39;mode-btn-training&#39;);
            const btnSim = document.getElementById(&#39;mode-btn-simulator&#39;);
            const desc = document.getElementById(&#39;mode-description&#39;);
            
            if(mode === &#39;training&#39;) {
                btnTrain.className = &quot;mode-btn-active relative z-10 w-full py-2.5 text-sm font-bold rounded-lg transition-all duration-300 flex items-center justify-center gap-2&quot;;
                btnSim.className = &quot;mode-btn-inactive relative z-10 w-full py-2.5 text-sm font-bold rounded-lg transition-all duration-300 flex items-center justify-center gap-2&quot;;
                desc.innerText = &quot;Input your practical experiment data (X and Y) to train the linear regression model.&quot;;
                document.getElementById(&#39;data-entry-title&#39;).innerText = &quot;Step 3: Enter Data (X &amp; Y)&quot;;
                document.getElementById(&#39;run-btn-text&#39;).innerText = &quot;Start Training the Model&quot;;
                document.getElementById(&#39;graph-container&#39;).classList.replace(&#39;h-full&#39;, &#39;h-2/3&#39;);
                document.getElementById(&#39;prediction-panel&#39;).style.display = &#39;flex&#39;;
            } else {
                btnSim.className = &quot;mode-btn-active relative z-10 w-full py-2.5 text-sm font-bold rounded-lg transition-all duration-300 flex items-center justify-center gap-2&quot;;
                btnTrain.className = &quot;mode-btn-inactive relative z-10 w-full py-2.5 text-sm font-bold rounded-lg transition-all duration-300 flex items-center justify-center gap-2&quot;;
                desc.innerText = &quot;Input Independent Variables (X). The internal model will automatically simulate and predict the gas volume (Y).&quot;;
                document.getElementById(&#39;data-entry-title&#39;).innerText = &quot;Step 3: Enter Data (X only)&quot;;
                document.getElementById(&#39;run-btn-text&#39;).innerText = &quot;Simulate &amp; Predict Data&quot;;
                document.getElementById(&#39;graph-container&#39;).classList.replace(&#39;h-2/3&#39;, &#39;h-full&#39;);
                document.getElementById(&#39;prediction-panel&#39;).style.display = &#39;none&#39;;
            }

            if(currentVar) {
                const activeCard = document.querySelector(&#39;.var-card.ring-indigo-500&#39;);
                if(activeCard) selectVariable(currentVar, activeCard);
            }
        }

        function selectVariable(varKey, cardElement) {
            currentVar = varKey;
            document.querySelectorAll(&#39;.var-card&#39;).forEach(card =&gt; {
                card.classList.remove(&#39;ring-2&#39;, &#39;ring-indigo-500&#39;, &#39;bg-indigo-50/30&#39;, &#39;border-indigo-500&#39;);
                card.classList.add(&#39;border-slate-200&#39;, &#39;bg-white&#39;);
                const iconBg = card.querySelector(&#39;.icon-bg&#39;);
                iconBg.classList.remove(&#39;bg-indigo-600&#39;, &#39;text-white&#39;);
                iconBg.classList.add(&#39;bg-indigo-50&#39;, &#39;text-indigo-500&#39;);
            });
            
            cardElement.classList.remove(&#39;border-slate-200&#39;, &#39;bg-white&#39;);
            cardElement.classList.add(&#39;ring-2&#39;, &#39;ring-indigo-500&#39;, &#39;bg-indigo-50/30&#39;, &#39;border-indigo-500&#39;);
            const iconBg = cardElement.querySelector(&#39;.icon-bg&#39;);
            iconBg.classList.remove(&#39;bg-indigo-50&#39;, &#39;text-indigo-500&#39;);
            iconBg.classList.add(&#39;bg-indigo-600&#39;, &#39;text-white&#39;);

            const setupInfo = expData[currentVar];
            document.getElementById(&#39;x-unit-label&#39;).innerText = setupInfo.unit;
            
            const predictContainer = document.getElementById(&#39;predict-input-container&#39;);
            if (setupInfo.inputType === &#39;acid&#39; || setupInfo.inputType === &#39;metal&#39;) {
                const pName = setupInfo.inputType === &#39;acid&#39; ? &#39;Type Acid Name...&#39; : &#39;Type Metal Name...&#39;;
                const pUnit = setupInfo.inputType === &#39;acid&#39; ? &#39;H+&#39; : &#39;Idx&#39;;
                predictContainer.innerHTML = `
                    &lt;label class=&quot;block text-[11px] font-semibold text-indigo-200 mb-1&quot;&gt;Enter ${setupInfo.name}:&lt;/label&gt;
                    &lt;div class=&quot;flex overflow-hidden rounded-lg border border-indigo-400 focus-within:ring-2 focus-within:ring-white transition-all shadow-inner bg-indigo-500 p-0.5&quot;&gt;
                        &lt;input type=&quot;text&quot; class=&quot;w-[70%] bg-transparent py-2 px-3 text-white placeholder-indigo-300 outline-none text-sm&quot; placeholder=&quot;${pName}&quot; oninput=&quot;attemptAutoFill(this, &#39;${setupInfo.inputType}&#39;)&quot;&gt;
                        &lt;div class=&quot;x-auto-box w-[30%] flex items-center justify-center bg-indigo-600/80 rounded-md transition-colors duration-300&quot;&gt;
                            &lt;input type=&quot;number&quot; id=&quot;predict-input&quot; class=&quot;w-full bg-transparent text-center text-indigo-100 font-bold outline-none cursor-not-allowed text-sm&quot; placeholder=&quot;${pUnit}&quot; readonly&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;`;
            } else if (setupInfo.inputType === &#39;surfaceSelect&#39;) {
                let options = &#39;&lt;option value=&quot;&quot; disabled selected&gt;Select portion...&lt;/option&gt;&#39;;
                for(let i=1; i&lt;=20; i++) options += `&lt;option value=&quot;${i}&quot; class=&quot;text-slate-800&quot;&gt;2cm³ metal in ${i} portion${i&gt;1?&#39;s&#39;:&#39;&#39;}&lt;/option&gt;`;
                predictContainer.innerHTML = `
                    &lt;label class=&quot;block text-[11px] font-semibold text-indigo-200 mb-1&quot;&gt;Select ${setupInfo.name}:&lt;/label&gt;
                    &lt;select id=&quot;predict-input&quot; class=&quot;w-full bg-indigo-500 border border-indigo-400 rounded-lg py-2.5 px-3 text-white outline-none focus:ring-2 focus:ring-white shadow-inner appearance-none cursor-pointer&quot;&gt;${options}&lt;/select&gt;`;
            } else {
                predictContainer.innerHTML = `
                    &lt;label class=&quot;block text-[11px] font-semibold text-indigo-200 mb-1&quot;&gt;Enter ${setupInfo.name} (${setupInfo.unit}):&lt;/label&gt;
                    &lt;input type=&quot;number&quot; id=&quot;predict-input&quot; class=&quot;w-full bg-indigo-500 border border-indigo-400 rounded-lg py-2 px-3 text-white placeholder-indigo-300 outline-none focus:ring-2 focus:ring-white shadow-inner&quot; placeholder=&quot;Numeric value...&quot;&gt;`;
            }

        // --- SMART DICTIONARY &amp; ROW MANAGEMENT ---
        function attemptAutoFill(inputEl, type) {
            const val = inputEl.value.toLowerCase().trim();
            const boxContainer = inputEl.nextElementSibling; 
            const numberInput = boxContainer.querySelector(&#39;input&#39;) || document.getElementById(&#39;predict-input&#39;);
            const isPrediction = numberInput.id === &#39;predict-input&#39;;
            
            if(!val) {
                numberInput.value = &#39;&#39;;
                if(!isPrediction) { boxContainer.classList.remove(&#39;bg-emerald-100&#39;, &#39;border-emerald-300&#39;); boxContainer.classList.add(&#39;bg-slate-50&#39;, &#39;border-slate-200&#39;); numberInput.classList.remove(&#39;text-emerald-700&#39;); numberInput.classList.add(&#39;text-indigo-500&#39;); } 
                else { boxContainer.classList.remove(&#39;bg-emerald-500&#39;); boxContainer.classList.add(&#39;bg-indigo-600/80&#39;); }

            }

            let foundVal = &#39;&#39;;
            let dict = type === &#39;metal&#39; 
                ? { &quot;potassium&quot;:100, &quot;k&quot;:100, &quot;sodium&quot;:95, &quot;na&quot;:95, &quot;calcium&quot;:90, &quot;ca&quot;:90, &quot;magnesium&quot;:80, &quot;mg&quot;:80, &quot;aluminum&quot;:70, &quot;al&quot;:70, &quot;zinc&quot;:60, &quot;zn&quot;:60, &quot;iron&quot;:50, &quot;fe&quot;:50, &quot;tin&quot;:40, &quot;sn&quot;:40, &quot;lead&quot;:30, &quot;pb&quot;:30, &quot;copper&quot;:10, &quot;cu&quot;:10, &quot;silver&quot;:5, &quot;ag&quot;:5, &quot;gold&quot;:1, &quot;au&quot;:1 }
                : { &quot;hydrochloric&quot;:1, &quot;hcl&quot;:1, &quot;nitric&quot;:1, &quot;hno3&quot;:1, &quot;sulfuric&quot;:2, &quot;h2so4&quot;:2, &quot;carbonic&quot;:2, &quot;h2co3&quot;:2, &quot;phosphoric&quot;:3, &quot;h3po4&quot;:3, &quot;ethanoic&quot;:1, &quot;acetic&quot;:1, &quot;citric&quot;:3 };

            for (const [key, num] of Object.entries(dict)) { if (key === val) { foundVal = num; break; } }
            if (foundVal === &#39;&#39; &amp;&amp; val.length &gt;= 2) { for (const [key, num] of Object.entries(dict)) { if (key.startsWith(val)) { foundVal = num; break; } } }
            
            if (foundVal !== &#39;&#39;) {
                numberInput.value = foundVal;
                if(!isPrediction) { boxContainer.classList.add(&#39;bg-emerald-100&#39;, &#39;border-emerald-300&#39;); boxContainer.classList.remove(&#39;bg-slate-50&#39;, &#39;border-slate-200&#39;); numberInput.classList.add(&#39;text-emerald-700&#39;); numberInput.classList.remove(&#39;text-indigo-500&#39;); } 
                else { boxContainer.classList.add(&#39;bg-emerald-500&#39;); boxContainer.classList.remove(&#39;bg-indigo-600/80&#39;); }
            } else {
                numberInput.value = &#39;&#39;;
                if(!isPrediction) { boxContainer.classList.remove(&#39;bg-emerald-100&#39;, &#39;border-emerald-300&#39;); boxContainer.classList.add(&#39;bg-slate-50&#39;, &#39;border-slate-200&#39;); numberInput.classList.remove(&#39;text-emerald-700&#39;); numberInput.classList.add(&#39;text-indigo-500&#39;); } 
                else { boxContainer.classList.remove(&#39;bg-emerald-500&#39;); boxContainer.classList.add(&#39;bg-indigo-600/80&#39;); }
            }
            if(!isPrediction) checkInputs();
        }

        function addDataRow() {

                xInputHTML = `&lt;select class=&quot;x-input form-input w-1/2 font-medium text-[11.5px] h-[38px] px-1 py-0 cursor-pointer&quot; onchange=&quot;checkInputs()&quot;&gt;${options}&lt;/select&gt;`;

                        &lt;input type=&quot;text&quot; class=&quot;x-name w-[65%] px-2 py-1 text-[13px] outline-none text-slate-700&quot; placeholder=&quot;${setupInfo.inputType === &#39;acid&#39; ? &#39;Type Acid...&#39; : &#39;Type Metal...&#39;}&quot; oninput=&quot;attemptAutoFill(this, &#39;${setupInfo.inputType}&#39;)&quot;&gt;

        function lockUIBackground(locked) {
            document.getElementById(&#39;run-btn&#39;).disabled = locked;
            document.querySelectorAll(&#39;#data-rows input:not([readonly]), #data-rows select&#39;).forEach(i =&gt; i.disabled = locked);

        // --- MATH / REGRESSION ---
        function calculateLinearRegression(dataPoints) {
            const n = dataPoints.length; let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
            dataPoints.forEach(p =&gt; { sumX += p.x; sumY += p.y; sumXY += p.x * p.y; sumXX += p.x * p.x; });
            const denominator = (n * sumXX - sumX * sumX);
            if (denominator === 0) return { m: 0, c: sumY / n }; 
            
            const m = (n * sumXY - sumX * sumY) / denominator;
            const c = (sumY - m * sumX) / n;
            return { m, c };
        }

        // --- MUTUAL EXCLUSION LOGIC (Concentration vs pH) ---
        function togglePhConc(element, type) {
            const concInput = document.getElementById(&#39;ctrl-var-concentration&#39;);
            const phInput = document.getElementById(&#39;ctrl-var-ph&#39;);
            if (!concInput || !phInput) return; 

            if (type === &#39;concentration&#39;) {
                if (element.value !== &#39;&#39;) {
                    phInput.disabled = true;
                    phInput.value = &#39;&#39;;
                } else {
                    phInput.disabled = false;
                }
            } else if (type === &#39;ph&#39;) {
                if (element.value !== &#39;&#39;) {
                    concInput.disabled = true;
                    concInput.value = &#39;&#39;;
                } else {
                    concInput.disabled = false;
                }
            }
        }

        // --- EXECUTION LOGIC (MODALS INCLUDED) ---
        function executeAction() {
            showSetupModal();

        function handleModalAction() {

        // 1. Prepare Data &amp; Show Data Transfer Modal with Editable Constants
        function showSetupModal() {
            if (!currentVar) return;
            pendingTrainingPoints = [];
            const setupInfo = expData[currentVar];
            let validPoints = 0;
            
            // Populate Extracted Data
            const listContainer = document.getElementById(&#39;data-prep-list&#39;);

                const xInput = row.querySelector(&#39;.x-input&#39;);
                const xNameInput = row.querySelector(&#39;.x-name&#39;);
                const yInput = row.querySelector(&#39;.y-input&#39;);

                const xVal = parseFloat(xInput.value.trim());

                if (currentMode === &#39;training&#39;) {

                        addExtractedRowHTML(listContainer, xVal, xNameInput, setupInfo, yVal);

                    }
                } else {

                        let calcYVal = setupInfo.calcY(xVal);
                        pendingTrainingPoints.push({x: xVal, y: calcYVal});
                        addExtractedRowHTML(listContainer, xVal, xNameInput, setupInfo, null);
                        validPoints++;
                    }
                }

            if (currentMode === &#39;training&#39; &amp;&amp; validPoints &lt; 2) return;

            document.getElementById(&#39;modal-sub-title&#39;).innerText = currentMode === &#39;training&#39; ? &#39;Data Normalization&#39; : &#39;Environment Setup&#39;;
            document.getElementById(&#39;modal-desc&#39;).innerText = currentMode === &#39;training&#39; ? &#39;The system is compiling your independent (X) and dependent (Y) variables into numerical arrays required for the linear regression training algorithm...&#39; : &#39;Please review and adjust the controlled variables (constants) for your virtual laboratory environment before running the simulation.&#39;;
            document.getElementById(&#39;modal-action-btn&#39;).innerText = currentMode === &#39;training&#39; ? &#39;Start Training&#39; : &#39;Run Simulation&#39;;
            document.getElementById(&#39;modal-complete-text&#39;).innerText = currentMode === &#39;training&#39; ? &#39;Data transfer complete! Click to start training.&#39; : &#39;Configuration complete! Click to run simulation.&#39;;

            const controlledContainer = document.getElementById(&#39;controlled-vars-list&#39;);

            for (const [key, data] of Object.entries(expData)) {

                        inputHTML = `&lt;select ${inputId} class=&quot;w-full text-[11px] p-1.5 border border-slate-200 rounded text-slate-700 outline-none focus:border-indigo-400 bg-white shadow-sm cursor-pointer&quot;&gt;${options}&lt;/select&gt;`;
                    } else if (data.inputType === &#39;acid&#39; || data.inputType === &#39;metal&#39;) {
                        inputHTML = `&lt;input type=&quot;text&quot; ${inputId} class=&quot;w-full text-[11px] p-1.5 border border-slate-200 rounded text-slate-700 outline-none focus:border-indigo-400 bg-white shadow-sm&quot; placeholder=&quot;${data.xPlaceholder}&quot; value=&quot;${data.defaultVal}&quot;&gt;`;

                                &lt;input type=&quot;number&quot; ${inputId} step=&quot;any&quot; ${onInputAttr} class=&quot;w-full text-[11px] p-1.5 border border-slate-200 border-r-0 rounded-l text-slate-700 outline-none focus:border-indigo-400 bg-white disabled:bg-slate-100 disabled:text-slate-400&quot; placeholder=&quot;${data.xPlaceholder}&quot; value=&quot;${startVal}&quot;&gt;
                                &lt;span class=&quot;bg-slate-100 border border-slate-200 rounded-r px-2 py-1.5 text-[9px] text-slate-500 font-bold flex items-center justify-center&quot;&gt;${data.unit}&lt;/span&gt;
                            &lt;/div&gt;
                        `;

        function addExtractedRowHTML(container, xVal, xNameInput, setupInfo, yVal) {

        // 2. Start Model Training Animation Modal
        let trainingAnimFrame;
        function startActualTraining() {
            document.getElementById(&#39;data-prep-modal&#39;).classList.add(&#39;hidden&#39;);
            
            document.getElementById(&#39;training-title&#39;).innerText = &quot;Training Model...&quot;;
            document.getElementById(&#39;training-spinner-container&#39;).className = &quot;bg-indigo-100 text-indigo-600 p-2 rounded-full&quot;;
            document.getElementById(&#39;training-spinner&#39;).innerHTML = `&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15&quot;&gt;&lt;/path&gt;`;
            document.getElementById(&#39;training-spinner&#39;).classList.add(&#39;animate-spin&#39;);
            
            document.getElementById(&#39;train-progress-bar&#39;).style.width = &#39;0%&#39;;
            document.getElementById(&#39;train-progress-text&#39;).innerText = &#39;0%&#39;;
            
            const initialLoss = Math.random() * 0.5 + 0.6; 
            document.getElementById(&#39;train-loss&#39;).innerText = initialLoss.toFixed(4);
            
            document.getElementById(&#39;model-training-modal&#39;).classList.remove(&#39;hidden&#39;);

            const duration = 3000; 
            const startTime = Date.now();

            function animateTraining() {
                const elapsed = Date.now() - startTime;
                let progress = elapsed / duration;
                if (progress &gt; 1) progress = 1;

                document.getElementById(&#39;train-progress-bar&#39;).style.width = `${Math.floor(progress * 100)}%`;
                document.getElementById(&#39;train-progress-text&#39;).innerText = `${Math.floor(progress * 100)}%`;
                
                const currentLoss = initialLoss * Math.exp(-5 * progress);
                document.getElementById(&#39;train-loss&#39;).innerText = currentLoss.toFixed(4);
                
                document.getElementById(&#39;train-elapsed&#39;).innerText = `${(progress * (duration/1000)).toFixed(1)}s`;
                document.getElementById(&#39;train-remain&#39;).innerText = `${((1 - progress) * (duration/1000)).toFixed(1)}s`;

                if (progress &lt; 1) {
                    trainingAnimFrame = requestAnimationFrame(animateTraining);
                } else {
                    document.getElementById(&#39;training-spinner&#39;).classList.remove(&#39;animate-spin&#39;);
                    document.getElementById(&#39;training-spinner-container&#39;).className = &quot;bg-emerald-100 text-emerald-600 p-2 rounded-full&quot;;
                    document.getElementById(&#39;training-spinner&#39;).innerHTML = `&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M5 13l4 4L19 7&quot;&gt;&lt;/path&gt;`;
                    document.getElementById(&#39;training-title&#39;).innerText = &quot;Training Complete!&quot;;
                    
                    setTimeout(finishTraining, 600);
                }
            }
            trainingAnimFrame = requestAnimationFrame(animateTraining);
        }

        // 3. Finish Training, Draw Graph, Unlock UI
        function finishTraining() {
            document.getElementById(&#39;model-training-modal&#39;).classList.add(&#39;hidden&#39;);
            lockUIBackground(false);

            document.getElementById(&#39;setup-overlay&#39;).classList.add(&#39;hidden&#39;); 
            document.getElementById(&#39;chart-placeholder&#39;).classList.add(&#39;hidden&#39;);
            document.getElementById(&#39;resultsChart&#39;).classList.remove(&#39;hidden&#39;);

            trainedModel = calculateLinearRegression(pendingTrainingPoints);
            
            const xValues = pendingTrainingPoints.map(p =&gt; p.x);
            const padding = (Math.max(...xValues) - Math.min(...xValues)) * 0.1 || 1; 
            const lineData = [
                { x: Math.min(...xValues) - padding, y: trainedModel.m * (Math.min(...xValues) - padding) + trainedModel.c },
                { x: Math.max(...xValues) + padding, y: trainedModel.m * (Math.max(...xValues) + padding) + trainedModel.c }
            ];

            renderGraph(pendingTrainingPoints, lineData);
            
            document.getElementById(&#39;prediction-panel&#39;).classList.remove(&#39;opacity-0&#39;, &#39;pointer-events-none&#39;, &#39;translate-y-4&#39;);
            document.getElementById(&#39;download-png-btn&#39;).classList.remove(&#39;hidden&#39;);
            document.getElementById(&#39;run-btn-text&#39;).innerText = &quot;Re-Train Model&quot;;
        }

        // --- SIMULATOR LOGIC ---
        function runSimulator() {
            let maxPredictedY = 0;
            pendingTrainingPoints.forEach(p =&gt; {
                if(p.y &gt; maxPredictedY) maxPredictedY = p.y;
            });

            const progContainer = document.getElementById(&#39;progress-container&#39;);
            const progBar = document.getElementById(&#39;progress-bar&#39;);
            
            lockUIBackground(true); 
            document.getElementById(&#39;run-btn-text&#39;).innerText = &quot;Simulating Chemical Reaction...&quot;;
            progContainer.classList.remove(&#39;hidden&#39;);
            void progBar.offsetWidth; 
            progBar.style.width = &#39;100%&#39;;
            
            document.getElementById(&#39;setup-overlay&#39;).classList.add(&#39;hidden&#39;);
            document.getElementById(&#39;chart-placeholder&#39;).classList.add(&#39;hidden&#39;);
            document.getElementById(&#39;download-png-btn&#39;).classList.add(&#39;hidden&#39;);
            document.getElementById(&#39;resultsChart&#39;).classList.remove(&#39;hidden&#39;);

            document.getElementById(&#39;lab-setup&#39;).classList.add(&#39;active-experiment&#39;);
            setLabVolume(maxPredictedY);

            setTimeout(() =&gt; {
                document.getElementById(&#39;lab-setup&#39;).classList.remove(&#39;active-experiment&#39;);
                
                progBar.style.transition = &#39;none&#39;;
                progBar.style.width = &#39;0&#39;;
                setTimeout(() =&gt; progBar.style.transition = &#39;width 2.5s linear&#39;, 50);
                progContainer.classList.add(&#39;hidden&#39;);
                
                document.getElementById(&#39;run-btn-text&#39;).innerText = &quot;Re-Simulate Data&quot;;
                lockUIBackground(false);

                let ptIndex = 0;
                const yInputs = document.querySelectorAll(&#39;.y-input&#39;);
                document.querySelectorAll(&#39;.x-input&#39;).forEach((input, index) =&gt; {
                    if (!isNaN(parseFloat(input.value.trim()))) {
                        yInputs[index].value = pendingTrainingPoints[ptIndex].y.toFixed(1);
                        ptIndex++;
                    }
                });

                pendingTrainingPoints.sort((a,b) =&gt; a.x - b.x);
                renderGraph(pendingTrainingPoints, null); 
                document.getElementById(&#39;download-png-btn&#39;).classList.remove(&#39;hidden&#39;);
                
            }, 2500);
        }

        // --- VISUAL &amp; PREDICTION LOGIC ---
        function resetLabVisual() {
            document.getElementById(&#39;gas-space&#39;).style.height = &#39;0px&#39;;
            document.getElementById(&#39;cylinder-water&#39;).setAttribute(&#39;y&#39;, 40);
            document.getElementById(&#39;cylinder-water&#39;).style.height = &#39;220px&#39;;
        }

        function setLabVolume(volumeY) {
            let visualY = Math.min(110, volumeY);
            let h = visualY * 2; 
            document.getElementById(&#39;gas-space&#39;).style.height = h + &#39;px&#39;;
            document.getElementById(&#39;cylinder-water&#39;).setAttribute(&#39;y&#39;, 40 + h);
            document.getElementById(&#39;cylinder-water&#39;).style.height = (220 - h) + &#39;px&#39;;
        }

        function runPrediction() {
            const inputEl = document.getElementById(&#39;predict-input&#39;);
            if(!inputEl) return;
            const inputVal = parseFloat(inputEl.value);
            if (isNaN(inputVal)) { alert(&quot;Please enter a valid known input to make a prediction.&quot;); return; }

            const btn = document.getElementById(&#39;predict-btn&#39;);
            btn.disabled = true; btn.innerHTML = &#39;Predicting...&#39;;

            let predictedY = (trainedModel.m * inputVal) + trainedModel.c;
            if (predictedY &lt; 0) predictedY = 0; 

            document.getElementById(&#39;lab-setup&#39;).classList.add(&#39;active-experiment&#39;);
            setLabVolume(predictedY);

            setTimeout(() =&gt; {
                document.getElementById(&#39;lab-setup&#39;).classList.remove(&#39;active-experiment&#39;);
                const resEl = document.getElementById(&#39;predict-result&#39;);
                resEl.innerHTML = `${predictedY.toFixed(2)} &lt;span class=&quot;text-sm font-bold text-emerald-200&quot;&gt;cm³&lt;/span&gt;`;
                resEl.classList.add(&#39;scale-110&#39;); setTimeout(() =&gt; resEl.classList.remove(&#39;scale-110&#39;), 200);
                
                btn.disabled = false; btn.innerHTML = &#39;Predict Y&#39;;

                // Add Red Dot to graph
                if (chartInstance) {
                    let pIndex = chartInstance.data.datasets.findIndex(ds =&gt; ds.label === &#39;Predicted Point&#39;);
                    if (pIndex === -1) {
                        chartInstance.data.datasets.push({
                            type: &#39;scatter&#39;,
                            label: &#39;Predicted Point&#39;,
                            data: [{ x: inputVal, y: predictedY }],
                            backgroundColor: &#39;#ef4444&#39;,
                            borderColor: &#39;#b91c1c&#39;,
                            borderWidth: 2,
                            pointBackgroundColor: &#39;#ef4444&#39;,
                            pointBorderColor: &#39;#ffffff&#39;,
                            pointBorderWidth: 2,
                            pointRadius: 8,
                            pointHoverRadius: 10,
                            showLine: false,
                            order: 0
                        });
                    } else {
                        chartInstance.data.datasets[pIndex].data = [{ x: inputVal, y: predictedY }];
                    }
                    chartInstance.update();
                }
            }, 2000);
        }

        function renderGraph(scatterPoints, linePoints) {
            const setupInfo = expData[currentVar];
            const ctx = document.getElementById(&#39;resultsChart&#39;).getContext(&#39;2d&#39;);
            if (chartInstance) chartInstance.destroy();

            const datasets = [{
                type: currentMode === &#39;simulator&#39; ? &#39;line&#39; : &#39;scatter&#39;, 
                label: currentMode === &#39;simulator&#39; ? &#39;Simulated Curve&#39; : &#39;User Practical Data&#39;,
                data: scatterPoints,
                backgroundColor: currentMode === &#39;simulator&#39; ? &#39;#10b981&#39; : &#39;#6366f1&#39;,
                borderColor: currentMode === &#39;simulator&#39; ? &#39;#10b981&#39; : &#39;#4f46e5&#39;,
                borderWidth: currentMode === &#39;simulator&#39; ? 3 : 0,
                pointBackgroundColor: currentMode === &#39;simulator&#39; ? &#39;#10b981&#39; : &#39;#6366f1&#39;,
                pointBorderColor: &#39;#ffffff&#39;, pointBorderWidth: 2, pointRadius: 6, pointHoverRadius: 8, tension: 0.1 
            }];

            if(linePoints) {
                datasets.push({ type: &#39;line&#39;, label: &#39;Trained Regression Model&#39;, data: linePoints, borderColor: &#39;#10b981&#39;, borderWidth: 2, borderDash: [5, 5], pointRadius: 0, fill: false, tension: 0 });
            }

            chartInstance = new Chart(ctx, {
                data: { datasets: datasets },
                plugins: [customCanvasBackgroundColor],
                options: {
                    responsive: true, maintainAspectRatio: false, animation: { duration: 1500, easing: &#39;easeOutQuint&#39; },
                    plugins: {
                        legend: { display: false }, customCanvasBackgroundColor: { color: &#39;white&#39; },
                        tooltip: { backgroundColor: &#39;rgba(30, 41, 59, 0.9)&#39;, titleColor: &#39;#fff&#39;, bodyColor: &#39;#fff&#39;, padding: 10,
                            callbacks: { 
                                label: function(context) { 
                                    if (context.dataset.label === &#39;Predicted Point&#39;) {
                                        return ` Predicted: X=${context.parsed.x}, Vol=${context.parsed.y.toFixed(1)} cm³`;
                                    }
                                    return context.dataset.type === &#39;scatter&#39; ? ` Recorded: X=${context.parsed.x}, Vol=${context.parsed.y.toFixed(1)} cm³` : ` Model: Vol=${context.parsed.y.toFixed(1)} cm³`; 
                                } 
                            }
                        }
                    },
                    scales: {
                        x: { type: &#39;linear&#39;, position: &#39;bottom&#39;, title: { display: true, text: `${setupInfo.name} (${setupInfo.unit})`, color: &#39;#475569&#39;, font: {size:11, weight:&#39;bold&#39;} }, grid: { color: &#39;#f1f5f9&#39; },
                            ticks: { callback: function(value) { return currentVar === &#39;surfaceArea&#39; ? value + &#39; pts&#39; : value; } }
                        },
                        y: { title: { display: true, text: &#39;Volume of H₂ (cm³)&#39;, color: &#39;#047857&#39;, font: {size:11, weight:&#39;bold&#39;} }, grid: { color: &#39;#f1f5f9&#39; } }
                    }
                }
            });
        }
        
        function downloadGraph() {
            const canvas = document.getElementById(&#39;resultsChart&#39;);
            if(canvas) { const link = document.createElement(&#39;a&#39;); link.download = `Acid-Metal-Graph-${currentVar}.png`; link.href = canvas.toDataURL(&#39;image/png&#39;); link.click(); }
        }

        // --- QR CODE SHARING &amp; SCANNING ---
        function openQRModal() {
            if(!currentVar) { alert(&quot;Please select a variable and input some data first.&quot;); return; }
            const dataToEncode = { m: currentMode === &#39;training&#39; ? &#39;t&#39; : &#39;s&#39;, v: currentVar, d: [] };
            document.querySelectorAll(&#39;.data-row&#39;).forEach(row =&gt; {
                const xInput = row.querySelector(&#39;.x-input&#39;), xName = row.querySelector(&#39;.x-name&#39;), yInput = row.querySelector(&#39;.y-input&#39;);
                let rowData = {};
                if(xInput &amp;&amp; xInput.value.trim() !== &#39;&#39;) rowData.x = xInput.value.trim();
                if(xName &amp;&amp; xName.value.trim() !== &#39;&#39;) rowData.xn = xName.value.trim();
                if(yInput &amp;&amp; yInput.value.trim() !== &#39;&#39;) rowData.y = yInput.value.trim();
                if(Object.keys(rowData).length &gt; 0) dataToEncode.d.push(rowData);
            });
            document.getElementById(&#39;qr-modal&#39;).classList.remove(&#39;hidden&#39;);
            const qrContainer = document.getElementById(&#39;qr-code-container&#39;);
            qrContainer.innerHTML = &#39;&#39;;
            new QRCode(qrContainer, { text: JSON.stringify(dataToEncode), width: 200, height: 200, colorDark : &quot;#1e293b&quot;, colorLight : &quot;#ffffff&quot;, correctLevel : QRCode.CorrectLevel.L });
        }

        function closeQRModal() { document.getElementById(&#39;qr-modal&#39;).classList.add(&#39;hidden&#39;); }

        function openScanModal() {
            document.getElementById(&#39;scan-modal&#39;).classList.remove(&#39;hidden&#39;);
            if(!html5QrcodeScanner) html5QrcodeScanner = new Html5QrcodeScanner(&quot;reader&quot;, { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 }, false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function closeScanModal() {
            document.getElementById(&#39;scan-modal&#39;).classList.add(&#39;hidden&#39;);
            if(html5QrcodeScanner) html5QrcodeScanner.clear().catch(e =&gt; console.error(e));
        }

        function onScanSuccess(decodedText, decodedResult) {
            closeScanModal();
            try {
                const importedData = JSON.parse(decodedText);
                if(importedData.m &amp;&amp; importedData.v &amp;&amp; importedData.d) applyImportedData(importedData);
                else alert(&quot;QR Code does not contain valid Virtual Lab data.&quot;);
            } catch(e) { alert(&quot;QR Code format is unrecognized.&quot;); }
        }

        function onScanFailure(error) { }

        function applyImportedData(data) {
            setMode(data.m === &#39;t&#39; ? &#39;training&#39; : &#39;simulator&#39;);
            const varMapping = [&#39;concentration&#39;, &#39;ph&#39;, &#39;acidType&#39;, &#39;temperature&#39;, &#39;surfaceArea&#39;, &#39;metalType&#39;];
            const cardIndex = varMapping.indexOf(data.v);
            if(cardIndex !== -1) selectVariable(data.v, document.querySelectorAll(&#39;.var-card&#39;)[cardIndex]);
            else return;

            document.getElementById(&#39;data-rows&#39;).innerHTML = &#39;&#39;; 
            data.d.forEach(rowData =&gt; {
                addDataRow(); 
                const rows = document.querySelectorAll(&#39;.data-row&#39;); const targetRow = rows[rows.length - 1]; 
                const xInput = targetRow.querySelector(&#39;.x-input&#39;), xName = targetRow.querySelector(&#39;.x-name&#39;), yInput = targetRow.querySelector(&#39;.y-input&#39;);

                if(xName &amp;&amp; rowData.xn) { xName.value = rowData.xn; attemptAutoFill(xName, expData[data.v].inputType); } 
                else if (xInput &amp;&amp; rowData.x) xInput.value = rowData.x;
                if(yInput &amp;&amp; rowData.y &amp;&amp; data.m === &#39;t&#39;) yInput.value = rowData.y;
            });
            checkInputs(); alert(&quot;✅ Lab Data Imported Successfully!&quot;);
        }
        
        setMode(&#39;training&#39;);
    &lt;/script&gt;
